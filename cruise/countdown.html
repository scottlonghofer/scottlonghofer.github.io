<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Countdown to September 6, 2026</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f0ea;
      --ink: #18212b;
      --muted: #66707a;
      --accent: #1f7a8c;
      --accent-dark: #135464;
      --panel: rgba(255, 255, 255, 0.78);
      --line: rgba(24, 33, 43, 0.12);
      --shadow: 0 24px 80px rgba(24, 33, 43, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 20%, rgba(31, 122, 140, 0.18), transparent 30%),
        radial-gradient(circle at 82% 72%, rgba(239, 125, 87, 0.16), transparent 32%),
        linear-gradient(135deg, #f7faf8 0%, var(--bg) 100%);
    }

    main {
      width: min(100%, 920px);
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent-dark);
      font-size: 0.86rem;
      font-weight: 750;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 780px;
      font-size: clamp(2.2rem, 6vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subhead {
      margin: 18px 0 0;
      max-width: 650px;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      line-height: 1.55;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: clamp(28px, 6vw, 52px);
    }

    .unit {
      min-height: 128px;
      display: grid;
      align-content: center;
      justify-items: center;
      padding: 18px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.62);
    }

    .value {
      font-variant-numeric: tabular-nums;
      font-size: clamp(2.25rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 0.95;
      color: var(--accent);
    }

    .label {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 760;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .status {
      min-height: 1.5em;
      margin: 24px 0 0;
      color: var(--accent-dark);
      font-weight: 700;
    }

    @media (max-width: 660px) {
      body {
        padding: 16px;
      }

      main {
        padding: 28px 18px;
      }

      .countdown {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .unit {
        min-height: 112px;
      }
    }
  </style>
</head>
<body>
  <main aria-labelledby="page-title">
    <p class="eyebrow">Counting down to</p>
    <h1 id="page-title">September 6, 2026</h1>
    <p class="subhead">A live countdown to midnight at the start of September 6, 2026 in your browser's local time.</p>

    <section class="countdown" aria-live="polite" aria-label="Countdown timer">
      <div class="unit">
        <div class="value" id="days">0</div>
        <div class="label">Days</div>
      </div>
      <div class="unit">
        <div class="value" id="hours">00</div>
        <div class="label">Hours</div>
      </div>
      <div class="unit">
        <div class="value" id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>
      <div class="unit">
        <div class="value" id="seconds">00</div>
        <div class="label">Seconds</div>
      </div>
    </section>

    <p class="status" id="status"></p>
  </main>

  <script>
    const targetDate = new Date(2026, 8, 6, 0, 0, 0);
    const formatter = new Intl.DateTimeFormat(undefined, {
      dateStyle: "full",
      timeStyle: "short"
    });

    const elements = {
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      status: document.getElementById("status")
    };

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = new Date();
      const remaining = targetDate - now;

      if (remaining <= 0) {
        elements.days.textContent = "0";
        elements.hours.textContent = "00";
        elements.minutes.textContent = "00";
        elements.seconds.textContent = "00";
        elements.status.textContent = "September 6, 2026 has arrived.";
        document.title = "Countdown complete";
        return;
      }

      const totalSeconds = Math.floor(remaining / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      elements.days.textContent = days;
      elements.hours.textContent = pad(hours);
      elements.minutes.textContent = pad(minutes);
      elements.seconds.textContent = pad(seconds);
      elements.status.textContent = `Target: ${formatter.format(targetDate)}`;
      document.title = `${days}d ${pad(hours)}h ${pad(minutes)}m ${pad(seconds)}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
